AWSTemplateFormatVersion: "2010-09-09"
Transform: [ AWS::LanguageExtensions, AWS::Serverless-2016-10-31 ]
Description: "Digital Identity CRI Test Automation Harness"

Parameters:
  CodeSigningConfigArn:
    Type: String
    Default: ""
  PermissionsBoundary:
    Type: String
    Default: ""
  CriIdentifier:
    Description: "The unique credential issuer identifier"
    Type: AWS::SSM::Parameter::Value<String>
    Default: "/common-cri-parameters/CriIdentifier"
  TxmaStackName:
    Description: "The stack containing the TXMA infrastructure"
    Type: String
    Default: txma-infrastructure
  CoreInfraStackName:
    Description: "The stack containing the Core Infra infrastructure"
    Type: String
    Default: core-infrastructure
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, localdev, build, staging, integration]
    ConstraintDescription: must be dev, localdev, build, staging, integration
  VpcStackName:
    Type: String
    Default: "cri-vpc"
    Description: The name of the VPC stack deployed.
  CommonStackNameOverride:
    Type: String
    Description: "Optional override of the oauth/common stack name, only needed for localdev. SSM param will be used by default /common-cri/oauth-common/stack-name"
    Default: ""
  IsPreview:
    Description: "Set to true for preview stack deployments to use a per-stack SNS relay queue instead of attaching directly to the TXMA queue"
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]

Mappings:
  KeyRotationMapping:
    di-ipv-cri-address-api:
      localdev: true
      dev: true
      build: true
      staging: true
      integration: true
      production: true
    di-ipv-cri-kbv-api:
      localdev: true
      dev: true
      build: true
      staging: true
      integration: true
      production: true
    di-ipv-cri-check-hmrc-api:
      localdev: true
      dev: true
      build: true
      staging: true
      integration: true
      production: true

  TestHarnessUrl:
    di-ipv-cri-check-hmrc-api:
      localdev: review-hc.dev.account.gov.uk
      dev: review-hc.dev.account.gov.uk
      build: review-hc.build.account.gov.uk
      staging: review-hc.staging.account.gov.uk
      integration: review-hc.integration.account.gov.uk
    di-ipv-cri-address-api:
      localdev: review-a.dev.account.gov.uk
      dev: review-a.dev.account.gov.uk
      build: review-a.build.account.gov.uk
      staging: review-a.staging.account.gov.uk
      integration: review-a.integration.account.gov.uk
    di-ipv-cri-kbv-api:
      localdev: review-k.dev.account.gov.uk
      dev: review-k.dev.account.gov.uk
      build: review-k.build.account.gov.uk
      staging: review-k.staging.account.gov.uk
      integration: review-k.integration.account.gov.uk

  CriVpcMapping:
    di-ipv-cri-check-hmrc-api:
      pipeline: "di-devplatform-deploy"
    di-ipv-cri-address-api:
      pipeline: "di-ipv-cri-pipeline-deployment"
    di-ipv-cri-kbv-api:
      pipeline: "di-ipv-cri-pipeline-deployment"

  AuditEventRelayAccounts:
    "486210938254":  # di-ipv-cri-common-dev
      Enabled: "true"
      RelayTopicArn: "arn:aws:sns:eu-west-2:486210938254:test-resources-audit-event-relay"

Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - W8003

Conditions:
  EnforceCodeSigning: !Not [!Equals [!Ref CodeSigningConfigArn, ""]]
  UsePermissionsBoundary: !Not [!Equals [!Ref PermissionsBoundary, ""]]
  DequeueEvents: !And
    - !Not [!Equals [!Ref Environment, localdev]]
    - !Not [!Equals [!Ref Environment, staging]]
    - !Not [!Equals [!Ref Environment, integration]]
  IsPreviewStack: !And
    - !Equals [!Ref IsPreview, "true"]
    - !Equals
      - !FindInMap [AuditEventRelayAccounts, !Sub "${AWS::AccountId}", Enabled, DefaultValue: "false"]
      - "true"
  IsNotPreviewStack: !Not [!Condition IsPreviewStack]
  CreateRelayInfrastructure: !And
    - !Condition IsNotPreviewStack
    - !Equals
      - !FindInMap [AuditEventRelayAccounts, !Sub "${AWS::AccountId}", Enabled, DefaultValue: "false"]
      - "true"

  # Don't create domain resources for the common dev account as there are none
  CreateDomainResources: !Not [!Equals [!Sub "${AWS::AccountId}", "486210938254"]]
  IsDevPlatformDeploy: !Equals [ !FindInMap [ CriVpcMapping, !Ref CriIdentifier, "pipeline"  ], "di-devplatform-deploy" ]
  IsDevOrBuildEnviroment: !Or
    - !Equals [!Ref Environment, dev]
    - !Equals [!Ref Environment, build]
  
  UseCommonStackNameOverride: !Not [!Equals [!Ref CommonStackNameOverride, ""]]

Globals:
  Function:
    CodeUri: ..
    Timeout: 30
    Runtime: nodejs22.x
    Architectures: [arm64]
    PermissionsBoundary:
      !If [UsePermissionsBoundary, !Ref PermissionsBoundary, !Ref AWS::NoValue]
    VpcConfig:
      SecurityGroupIds:
        - !ImportValue cri-vpc-AWSServicesEndpointSecurityGroupId
      SubnetIds: !If
        - IsDevPlatformDeploy
        - [ !ImportValue cri-vpc-ProtectedSubnetIdA, !ImportValue cri-vpc-ProtectedSubnetIdB ]
        - [ !ImportValue cri-vpc-PrivateSubnetIdA, !ImportValue cri-vpc-PrivateSubnetIdB ]
    Tracing: Active
    MemorySize: 1024
    Environment:
      Variables:
        NODE_OPTIONS: --enable-source-maps
        POWERTOOLS_METRICS_NAMESPACE: !Ref CriIdentifier
        POWERTOOLS_LOG_LEVEL: DEBUG
        COMMON_STACK_NAME: !If
            - UseCommonStackNameOverride
            - !Ref CommonStackNameOverride
            - "{{resolve:ssm:/common-cri/oauth-common/stack-name}}"
        AWS_STACK_NAME: !Sub ${AWS::StackName}
    AutoPublishAlias: live
    ProvisionedConcurrencyConfig: !If
      - IsDevOrBuildEnviroment
      - ProvisionedConcurrentExecutions: 1
      - !Ref AWS::NoValue

Resources:
  LambdaEgressSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: >-
        Permits outbound on port 443 from within the VPC to the internet.
      SecurityGroupEgress:
        - CidrIp: 0.0.0.0/0
          Description: Allow to the wider internet on port 443
          FromPort: 443
          IpProtocol: tcp
          ToPort: 443
      VpcId:
        Fn::ImportValue: !Sub "${VpcStackName}-VpcId"

  MockJwkFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Sourcemap: true
    Properties:
      FunctionName: !Sub "${AWS::StackName}-MockJwkFunction"
      Handler: headless-core-stub/lambdas/mock-jwks/src/mock-jwk-handler.lambdaHandler
      CodeSigningConfigArn:
        !If [EnforceCodeSigning, !Ref CodeSigningConfigArn, !Ref AWS::NoValue]
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParametersByPath
                - ssm:GetParameters
                - ssm:GetParameter
              Resource:
                - !If
                  - UseCommonStackNameOverride
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${CommonStackNameOverride}/clients/*"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/{{resolve:ssm:/common-cri/oauth-common/stack-name}}/clients/*"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/test-resources/ipv-core-stub-aws-headless/privateSigningKey"


  MockJwkFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${MockJwkFunction}"
      RetentionInDays: 30

  MockJwkFunctionAliasPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref MockJwkFunction.Alias
      Principal: apigateway.amazonaws.com

  StartFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Sourcemap: true
    Properties:
      FunctionName: !Sub "${AWS::StackName}-StartFunction"
      Handler: headless-core-stub/lambdas/start/src/start-handler.lambdaHandler
      CodeSigningConfigArn:
        !If [EnforceCodeSigning, !Ref CodeSigningConfigArn, !Ref AWS::NoValue]
      LoggingConfig:
        LogGroup: !Sub /aws/lambda/${AWS::StackName}/StartFunction
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: HeadlessCoreStubStartFunction
          DECRYPTION_KEY_ID: !ImportValue core-infrastructure-CriDecryptionKey1Id
          TEST_RESOURCES_STACK_NAME: !Sub ${AWS::StackName}
          KEY_ROTATION_FEATURE_FLAG_ENABLED: !FindInMap [ KeyRotationMapping, !Ref CriIdentifier, !Ref Environment ]
      Policies:
        - Statement:
            Effect: Allow
            Action: 'kms:GetPublicKey'
            Resource: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/*'
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParametersByPath
                - ssm:GetParameters
                - ssm:GetParameter
              Resource:
                - !If
                  - UseCommonStackNameOverride
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${CommonStackNameOverride}/clients/*/jwtAuthentication/*"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/{{resolve:ssm:/common-cri/oauth-common/stack-name}}/clients/*/jwtAuthentication/*"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/test-resources/ipv-core-stub-aws-headless/privateSigningKey"

  StartFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}/StartFunction"
      RetentionInDays: 30

  StartFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref StartFunction.Alias
      Principal: apigateway.amazonaws.com

  CallbackFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Sourcemap: true
    Properties:
      FunctionName: !Sub "${AWS::StackName}-CallbackFunction"
      Handler: headless-core-stub/lambdas/callback/src/callback-handler.lambdaHandler
      CodeSigningConfigArn:
        !If [EnforceCodeSigning, !Ref CodeSigningConfigArn, !Ref AWS::NoValue]
      Environment:
        Variables:
          API_KEY:
            Fn::ImportValue: !Sub "${CoreInfraStackName}-ApiKey1"
          CRI_IDENTIFIER: !Sub "${CriIdentifier}"
          TEST_RESOURCES_STACK_NAME: !Sub ${AWS::StackName}
          CORE_INFRASTRUCTURE: !Sub "${CoreInfraStackName}"
      Policies:
        - DynamoDBReadPolicy:
            TableName: !If
              - UseCommonStackNameOverride
              - !Sub "{{resolve:ssm:/${CommonStackNameOverride}/SessionTableName}}"
              - !Sub "{{resolve:ssm:/common-cri/oauth-common/stack-name}}/SessionTableName}}"
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParametersByPath
                - ssm:GetParameters
                - ssm:GetParameter
              Resource:
                - !If
                  - UseCommonStackNameOverride
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${CommonStackNameOverride}/clients/*/jwtAuthentication/*"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/{{resolve:ssm:/common-cri/oauth-common/stack-name}}/clients/*/jwtAuthentication/*"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/test-resources/ipv-core-stub-aws-headless/privateSigningKey"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/test-resources/apiKey"
            - Effect: Allow
              Action: cloudformation:DescribeStacks
              Resource: !Sub arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/core-infrastructure/*
            - Effect: Allow
              Action:
                - apigateway:GET
              Resource:
                - !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}::/apikeys
                - !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}::/apikeys/*

  CallbackFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${CallbackFunction}"
      RetentionInDays: 30

  CallbackFunctionAliasPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref CallbackFunction.Alias
      Principal: apigateway.amazonaws.com

  DequeueFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Sourcemap: true
    Properties:
      Handler: audit-events-test-harness/lambdas/src/dequeue-handler.lambdaHandler
      CodeSigningConfigArn:
        !If [EnforceCodeSigning, !Ref CodeSigningConfigArn, !Ref AWS::NoValue]
      VpcConfig:
        SecurityGroupIds:
          - !ImportValue cri-vpc-AWSServicesEndpointSecurityGroupId
        SubnetIds:
          - !ImportValue cri-vpc-PrivateSubnetIdA
          - !ImportValue cri-vpc-PrivateSubnetIdB
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: AuditEventDequeueFunction
          EVENTS_TABLE_NAME: !Ref AuditEventsTable
          RELAY_TOPIC_ARN: !If [CreateRelayInfrastructure, !Ref AuditEventRelayTopic, !Ref AWS::NoValue]
      Policies:
        - Statement:
            - Sid: DecryptAuditEventKeyPolicy
              Effect: Allow
              Action:
                - kms:Decrypt
              Resource: !If
                - IsPreviewStack
                - !GetAtt PerStackAuditQueueKey.Arn
                - Fn::ImportValue: !Sub "${TxmaStackName}-AuditEventQueueEncryptionKeyArn"
            - Sid: ConsumeAuditEventPolicy
              Effect: Allow
              Action:
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
                - sqs:ChangeMessageVisibility
                - sqs:ReceiveMessage
              Resource: !If
                - IsPreviewStack
                - !GetAtt PerStackAuditQueue.Arn
                - Fn::ImportValue: !Sub "${TxmaStackName}-AuditEventQueueArn"
            - Sid: PutEventsPolicy
              Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource:
                !GetAtt AuditEventsTable.Arn
            - !If
              - CreateRelayInfrastructure
              - Sid: PublishToRelayTopic
                Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref AuditEventRelayTopic
              - !Ref AWS::NoValue
      Events:
        AuditSQSEvent:
          Type: SQS
          Properties:
            Enabled: !If [DequeueEvents, true, false]
            Queue: !If
              - IsPreviewStack
              - !GetAtt PerStackAuditQueue.Arn
              - Fn::ImportValue: !Sub "${TxmaStackName}-AuditEventQueueArn"
            FunctionResponseTypes:
              - ReportBatchItemFailures

  DequeueFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${DequeueFunction}"
      RetentionInDays: 30

  AuditEventRelayTopic:
    Type: AWS::SNS::Topic
    Condition: CreateRelayInfrastructure
    Properties:
      TopicName: !Sub "${AWS::StackName}-audit-event-relay"

  PerStackAuditQueueKey:
    Type: AWS::KMS::Key
    Condition: IsPreviewStack
    Properties:
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: EnableRootAccess
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
          - Sid: AllowSNSToUseKey
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action:
              - kms:GenerateDataKey
              - kms:Decrypt
            Resource: "*"

  PerStackAuditQueue:
    Type: AWS::SQS::Queue
    Condition: IsPreviewStack
    Properties:
      KmsMasterKeyId: !Ref PerStackAuditQueueKey
      VisibilityTimeout: 30
      RedriveAllowPolicy:
        redrivePermission: denyAll

  PerStackAuditQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Condition: IsPreviewStack
    Properties:
      Queues: [!Ref PerStackAuditQueue]
      PolicyDocument:
        Statement:
          - Sid: AllowSNSToSendMessages
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt PerStackAuditQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !FindInMap [AuditEventRelayAccounts, !Sub "${AWS::AccountId}", RelayTopicArn]

  AuditEventRelaySubscription:
    Type: AWS::SNS::Subscription
    Condition: IsPreviewStack
    Properties:
      TopicArn: !FindInMap [AuditEventRelayAccounts, !Sub "${AWS::AccountId}", RelayTopicArn]
      Protocol: sqs
      Endpoint: !GetAtt PerStackAuditQueue.Arn
      RawMessageDelivery: true

  AuditEventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: partitionKey
          AttributeType: S
        - AttributeName: sortKey
          AttributeType: S
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: partitionKey
          KeyType: HASH
        - AttributeName: sortKey
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expiryDate
        Enabled: true

  TestHarnessAPIGateway:
    Type: AWS::Serverless::Api
    Properties:
      Description: APIGW for the test harness
      AlwaysDeploy: true
      DefinitionBody:
        openapi: 3.0.1
        paths:
          /never-created:
            options: { }
        Fn::Transform:
          Name: AWS::Include
          Parameters:
            Location: public-api.yaml
      Tags:
        FMSRegionalPolicy: false
        CustomPolicy: true
      Policy:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Principal: "*"
            Action: "execute-api:Invoke"
            Resource:
              - !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:*/${Environment}/GET/events*"
            Condition:
              StringNotEquals:
                "aws:PrincipalAccount":
                  - !Sub "${AWS::AccountId}"
          - Effect: Allow
            Principal: "*"
            Action: "execute-api:Invoke"
            Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:*/${Environment}/*/*"
      StageName: !Ref Environment
      MethodSettings:
        - LoggingLevel: INFO
          ResourcePath: "/*"
          HttpMethod: "*"
          DataTraceEnabled: true
          MetricsEnabled: true
          ThrottlingRateLimit: 10000
          ThrottlingBurstLimit: 20000
      AccessLogSetting:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
        Format:
          Fn::ToJsonString:
            requestId: $context.requestId
            ip: $context.identity.sourceIp
            requestTime: $context.requestTime
            httpMethod: $context.httpMethod
            path: $context.path
            routeKey: $context.routeKey
            status: $context.status
            protocol: $context.protocol
            responseLatency: $context.responseLatency
            responseLength: $context.responseLength

  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/vendedlogs/apigateway/${AWS::StackName}-test-harness-AccessLogs
      RetentionInDays: 30

  TestHarnessCustomDomain:
    Condition: CreateDomainResources
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: !Sub
        - ${AWS::StackName}.${TESTHARNESSURL}
        - TESTHARNESSURL:
            !FindInMap [ TestHarnessUrl, !Ref CriIdentifier, !Ref Environment ]
      DomainNameConfigurations:
        - CertificateArn: !Ref ExternalCertificate
          EndpointType: REGIONAL
          SecurityPolicy: TLS_1_2

  ExternalCertificate:
    Condition: CreateDomainResources
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Sub
        - ${AWS::StackName}.${TESTHARNESSURL}
        - TESTHARNESSURL:
            !FindInMap [ TestHarnessUrl, !Ref CriIdentifier, !Ref Environment ]
      SubjectAlternativeNames:
        - !Sub
          - ${AWS::StackName}.${TESTHARNESSURL}
          - TESTHARNESSURL:
              !FindInMap [ TestHarnessUrl, !Ref CriIdentifier, !Ref Environment ]
      DomainValidationOptions:
        - DomainName:  !Sub
            - ${AWS::StackName}.${TESTHARNESSURL}
            - TESTHARNESSURL:
                !FindInMap [ TestHarnessUrl, !Ref CriIdentifier, !Ref Environment ]
          HostedZoneId: !ImportValue PublicHostedZoneId
      ValidationMethod: DNS

  TestHarnessApiDomainRecord:
    Condition: CreateDomainResources
    Type: AWS::Route53::RecordSet
    Properties:
      Name: !Ref TestHarnessCustomDomain
      Type: A
      HostedZoneId: !ImportValue PublicHostedZoneId
      AliasTarget:
        DNSName: !GetAtt TestHarnessCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt TestHarnessCustomDomain.RegionalHostedZoneId
        EvaluateTargetHealth: false

  # Base Path Mapping
  TestHarnessApiBasePathMapping:
    Condition: CreateDomainResources
    Type: AWS::ApiGateway::BasePathMapping
    Properties:
      DomainName: !Ref TestHarnessCustomDomain
      RestApiId: !Ref TestHarnessAPIGateway

      # workaround for sam bug - see https://github.com/aws/serverless-application-model/issues/192#issuecomment-520893111
      # noinspection YamlUnresolvedReferences
      Stage: !Ref TestHarnessAPIGateway.Stage

  AuditEventsTableRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Allow APIGW to read from the AuditEventsTable
      PermissionsBoundary:
        !If [UsePermissionsBoundary, !Ref PermissionsBoundary, !Ref AWS::NoValue]
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action: sts:AssumeRole
            Principal:
              Service: apigateway.amazonaws.com
      Policies:
        - PolicyName: DynamoDBReadPolicy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                Resource: !GetAtt AuditEventsTable.Arn

Outputs:
  TestHarnessExecuteUrl:
    Description: API Gateway endpoint URL for the test harness endpoints
    Export:
      Name: !Sub ${AWS::StackName}-TestHarnessExecuteUrl
    Value: !If
      - CreateDomainResources
      - !Sub
        - https://${URL}/
        - URL: !Ref TestHarnessCustomDomain
      - !Sub https://${TestHarnessAPIGateway}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/

  CommonStackName:
    Description: Common stack name used by the test resources
    Export:
      Name: !Sub ${AWS::StackName}-CommonStackName
    Value: !If
      - UseCommonStackNameOverride
      - !Ref CommonStackNameOverride
      - "{{resolve:ssm:/common-cri/oauth-common/stack-name}}"
